<html lang="zh-TW">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TOEIC 全真模擬試題 Part 1–7</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a56db">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;color:#1a202c;min-height:100vh}
header{background:linear-gradient(135deg,#1a56db,#0e3fa5);color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
header h1{font-size:1.1rem;font-weight:700}
#timer{font-size:1.3rem;font-weight:700;background:rgba(255,255,255,.15);padding:6px 14px;border-radius:8px;letter-spacing:1px}
#timer.warn{background:#e53e3e;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* Screens */
#screen-intro,#screen-test,#screen-result{display:none;max-width:800px;margin:0 auto;padding:20px}
#screen-intro{display:block}

/* Intro */
.intro-card{background:#fff;border-radius:16px;padding:32px;box-shadow:0 2px 16px rgba(0,0,0,.08);margin-top:20px}
.intro-card h2{font-size:1.5rem;margin-bottom:12px;color:#1a56db}
.intro-card p{color:#4a5568;line-height:1.7;margin-bottom:8px}
.part-list{margin:16px 0;border-collapse:collapse;width:100%}
.part-list th,.part-list td{padding:8px 12px;border:1px solid #e2e8f0;text-align:left;font-size:.9rem}
.part-list th{background:#ebf4ff;color:#1a56db}
.btn-start{display:block;width:100%;padding:16px;background:linear-gradient(135deg,#1a56db,#0e3fa5);color:#fff;border:none;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer;margin-top:20px;transition:.2s}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(26,86,219,.4)}

/* Progress */
#progress-bar{background:#e2e8f0;height:6px;width:100%}
#progress-fill{height:6px;background:#1a56db;transition:width .3s}
#part-label{text-align:center;font-size:.8rem;color:#718096;padding:6px;background:#fff;border-bottom:1px solid #e2e8f0}

/* Question card */
.q-card{background:#fff;border-radius:14px;padding:24px;margin-bottom:16px;box-shadow:0 1px 8px rgba(0,0,0,.07)}
.q-num{font-size:.75rem;font-weight:700;color:#1a56db;text-transform:uppercase;margin-bottom:6px}
.q-text{font-size:1rem;line-height:1.7;margin-bottom:16px;color:#2d3748}
.q-text strong{color:#1a56db}
.passage{background:#f7fafc;border-left:3px solid #1a56db;padding:12px 16px;border-radius:0 8px 8px 0;font-size:.92rem;line-height:1.8;margin-bottom:16px;color:#2d3748}
.options{display:flex;flex-direction:column;gap:8px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border:2px solid #e2e8f0;border-radius:10px;cursor:pointer;transition:.15s;font-size:.93rem;line-height:1.5}
.opt:hover{border-color:#1a56db;background:#ebf4ff}
.opt.selected{border-color:#1a56db;background:#ebf4ff}
.opt.correct{border-color:#38a169;background:#f0fff4}
.opt.wrong{border-color:#e53e3e;background:#fff5f5}
.opt-letter{font-weight:700;color:#4a5568;min-width:18px}
.scene-img{width:100%;max-height:220px;object-fit:cover;border-radius:10px;margin-bottom:14px}
.audio-bar{display:flex;align-items:center;gap:10px;background:#f7fafc;border:1px solid #e2e8f0;border-radius:10px;padding:10px 14px;margin-bottom:14px}
.play-btn{background:#1a56db;color:#fff;border:none;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:.85rem;font-weight:600;white-space:nowrap}
.play-btn:hover{background:#0e3fa5}
.audio-label{font-size:.85rem;color:#4a5568}

/* Nav */
.nav-bar{display:flex;justify-content:space-between;align-items:center;margin-top:20px;gap:12px}
.btn-nav{padding:10px 24px;border:none;border-radius:10px;font-size:.95rem;font-weight:600;cursor:pointer;transition:.15s}
.btn-prev{background:#e2e8f0;color:#4a5568}
.btn-prev:hover{background:#cbd5e0}
.btn-next{background:#1a56db;color:#fff}
.btn-next:hover{background:#0e3fa5}
.btn-submit{background:#e53e3e;color:#fff}
.btn-submit:hover{background:#c53030}
.q-pills{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.pill{width:28px;height:28px;border-radius:50%;border:2px solid #e2e8f0;background:#fff;font-size:.7rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;color:#4a5568}
.pill.ans{border-color:#38a169;background:#f0fff4;color:#38a169}
.pill.cur{border-color:#1a56db;background:#1a56db;color:#fff}

/* Result */
.result-card{background:#fff;border-radius:16px;padding:28px;box-shadow:0 2px 16px rgba(0,0,0,.08);margin-top:20px}
.score-big{font-size:3rem;font-weight:800;color:#1a56db;text-align:center}
.score-sub{text-align:center;color:#718096;margin-bottom:20px}
.part-scores{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin:16px 0}
.ps{background:#f7fafc;border-radius:10px;padding:12px;text-align:center}
.ps-name{font-size:.72rem;color:#718096;font-weight:600}
.ps-val{font-size:1.3rem;font-weight:800;color:#1a56db}
.review-list{margin-top:20px}
.r-item{border:1px solid #e2e8f0;border-radius:10px;padding:14px;margin-bottom:10px;font-size:.88rem}
.r-item.ok{border-color:#38a169}
.r-item.bad{border-color:#e53e3e;background:#fff5f5}
.r-q{color:#2d3748;margin-bottom:6px;line-height:1.5}
.r-ans{font-size:.82rem;margin-top:4px}
.r-ans .correct-lbl{color:#38a169;font-weight:700}
.r-ans .wrong-lbl{color:#e53e3e;font-weight:700}
.btn-home{display:inline-block;margin-top:16px;padding:10px 20px;background:#1a56db;color:#fff;border:none;border-radius:10px;font-size:.95rem;font-weight:600;cursor:pointer;text-decoration:none}
.btn-home:hover{background:#0e3fa5}
.translation-box{margin-top:14px;background:#fffbeb;border:1.5px solid #f6e05e;border-radius:10px;padding:12px 16px;font-size:.88rem;line-height:1.7;color:#744210}
.translation-box .zh-label{font-size:.72rem;font-weight:700;color:#b7791f;text-transform:uppercase;margin-bottom:4px}
.translation-box .zh-sentence{color:#2d3748;font-size:.92rem}

/* Conversation / talk context */
.ctx-box{background:#fffbeb;border:1px solid #f6e05e;border-radius:10px;padding:14px;margin-bottom:14px;font-size:.88rem;line-height:1.8;color:#2d3748}
.ctx-title{font-size:.72rem;font-weight:700;color:#b7791f;margin-bottom:6px;text-transform:uppercase}
.dialogue p{margin-bottom:4px}
.dialogue .speaker{font-weight:700;color:#1a56db}
/* Group questions */
.group-q-item{border-top:2px dashed #e2e8f0;padding-top:18px;margin-top:18px}
.group-q-badge{display:inline-block;font-size:.7rem;font-weight:700;background:#e2e8f0;color:#4a5568;padding:2px 8px;border-radius:20px;margin-bottom:8px}
.group-q-badge.cur{background:#1a56db;color:#fff}
.ctx-hidden{display:flex;align-items:center;gap:8px;background:#f7fafc;border:1.5px dashed #cbd5e0;border-radius:10px;padding:12px 16px;margin-bottom:14px;color:#a0aec0;font-size:.85rem;font-style:italic}

@media(max-width:600px){
  header h1{font-size:.9rem}
  #timer{font-size:1rem;padding:4px 10px}
  .q-card{padding:16px}
  .btn-nav{padding:8px 16px;font-size:.85rem}
}
</style>

// ==================== APP STATE ====================
let current = 0;
let answers = new Array(QUESTIONS.length).fill(-1);
let timerSec = 140 * 60;
let timerID = null;
let testStarted = false;

function startTest() {
  document.getElementById('screen-intro').style.display = 'none';
  document.getElementById('screen-test').style.display = 'block';
  testStarted = true;
  buildPills();
  renderQ();
  startTimer();
}

function startTimer() {
  timerID = setInterval(() => {
    timerSec--;
    if (timerSec <= 0) { clearInterval(timerID); submitTest(); return; }
    updateTimerDisplay();
    if (timerSec <= 300) document.getElementById('timer').classList.add('warn');
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(timerSec / 60).toString().padStart(2,'0');
  const s = (timerSec % 60).toString().padStart(2,'0');
  document.getElementById('timer').textContent = m + ':' + s;
}

function buildPills() {
  const c = document.getElementById('q-pills');
  c.innerHTML = '';
  QUESTIONS.forEach((q,i) => {
    const d = document.createElement('button');
    d.className = 'pill' + (i === current ? ' cur' : '');
    d.textContent = i + 1;
    d.onclick = () => { current = i; renderQ(); };
    d.id = 'pill-' + i;
    c.appendChild(d);
  });
}

function updatePills() {
  QUESTIONS.forEach((_,i) => {
    const p = document.getElementById('pill-' + i);
    if (!p) return;
    p.className = 'pill' + (answers[i] >= 0 ? ' ans' : '') + (i === current ? ' cur' : '');
  });
}

// Build group index once
const GROUP_MAP = {};
QUESTIONS.forEach((q, i) => { if (q.gid) { if (!GROUP_MAP[q.gid]) GROUP_MAP[q.gid] = []; GROUP_MAP[q.gid].push(i); } });

function updateHeader() {
  const q = QUESTIONS[current];
  const isLast = current === QUESTIONS.length - 1;
  const pct = ((current + 1) / QUESTIONS.length * 100).toFixed(1);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('part-label').textContent = q.partName + ' — 第 ' + (current+1) + ' 題 / 共 ' + QUESTIONS.length + ' 題';
  document.getElementById('q-counter').textContent = (current + 1) + ' / ' + QUESTIONS.length;
  document.getElementById('btn-next').textContent = isLast ? '交卷' : '下一題 →';
  document.getElementById('btn-next').className = 'btn-nav ' + (isLast ? 'btn-submit' : 'btn-next');
  document.getElementById('btn-next').onclick = isLast ? submitTest : () => navQ(1);
}

function renderQ() {
  const q = QUESTIONS[current];
  updateHeader();

  // Grouped questions (Part 3/4)
  if (q.gid) { renderGroupQ(q.gid); return; }

  let html = '<div class="q-card">';
  html += '<div class="q-num">Question ' + (current+1) + ' &nbsp;|&nbsp; ' + q.partName + '</div>';

  // Scene (Part 1)
  if (q.part === 1 && q.svgScene) {
    html += '<div style="margin-bottom:14px">' + q.svgScene + '</div>';
  }

  // Audio bar (all parts)
  {
    const label = q.part <= 4 ? '點擊收聽題目（TTS 模擬）' : '點擊朗讀題目與選項（TTS）';
    html += '<div class="audio-bar"><button class="play-btn" onclick="speakCurrent()">▶ 朗讀</button><span class="audio-label">' + label + '</span></div>';
  }

  if (q.passageFull) html += '<div class="passage">' + q.passageFull + '</div>';
  if (q.passage) html += '<div class="passage">' + q.passage + '</div>';

  // Part 1-2 聽力題：未答題前隱藏題目文字
  if (q.part <= 2 && answers[current] < 0) {
    html += '<div class="q-text" style="color:#a0aec0;font-style:italic;font-size:.85rem">🔇 請先播放音檔並選擇答案</div>';
  } else {
    html += '<div class="q-text">' + q.text + '</div>';
  }

  html += '<div class="options">';
  q.options.forEach((opt, oi) => {
    let cls = 'opt';
    if (answers[current] >= 0) {
      if (oi === q.answer) cls += ' correct';
      else if (oi === answers[current] && answers[current] !== q.answer) cls += ' wrong';
    }
    html += '<div class="' + cls + '" onclick="selectAns(' + oi + ')">';
    html += '<span class="opt-letter">' + String.fromCharCode(65+oi) + '</span>';
    html += '<span>' + opt + '</span></div>';
  });
  html += '</div>';

  if (answers[current] >= 0 && (q.part === 5 || q.part === 6) && q.zh) {
    html += '<div class="translation-box"><div class="zh-label">📖 中文翻譯</div><div class="zh-sentence">' + q.zh + '</div></div>';
  }

  html += '</div>';
  document.getElementById('q-area').innerHTML = html;
  updatePills();
}

function renderGroupQ(gid) {
  const indices = GROUP_MAP[gid];
  const firstQ = QUESTIONS[indices[0]];
  // Context revealed only after first question of group is answered
  const ctxRevealed = answers[indices[0]] >= 0;

  let html = '<div class="q-card">';
  const qNums = indices.map(i => i + 1).join('、');
  html += '<div class="q-num">Questions ' + qNums + ' &nbsp;|&nbsp; ' + firstQ.partName + '</div>';

  // Audio bar (one for the whole group)
  html += '<div class="audio-bar"><button class="play-btn" onclick="speakGroup(\'' + gid + '\')">▶ 播放音檔</button><span class="audio-label">點擊收聽（TTS 模擬）</span></div>';

  // Context (dialogue/talk) — hidden until first Q answered
  if (!ctxRevealed) {
    html += '<div class="ctx-hidden">🔇 請先播放音檔，選完第一題後對話內容將顯示</div>';
  } else {
    html += '<div class="ctx-box">' + firstQ.ctx + '</div>';
  }

  // Each question in the group
  indices.forEach((qi, rank) => {
    const qq = QUESTIONS[qi];
    const isCur = qi === current;
    const isAnswered = answers[qi] >= 0;
    const isFirst = rank === 0;

    if (!isFirst) html += '<div class="group-q-item">';

    html += '<span class="group-q-badge' + (isCur ? ' cur' : '') + '">Q' + (qi + 1) + (isCur ? ' ◀ 目前題目' : '') + '</span>';

    // Question text: always visible (user needs to know what to answer)
    html += '<div class="q-text">' + qq.text + '</div>';

    html += '<div class="options">';
    qq.options.forEach((opt, oi) => {
      let cls = 'opt';
      if (isAnswered) {
        if (oi === qq.answer) cls += ' correct';
        else if (oi === answers[qi] && answers[qi] !== qq.answer) cls += ' wrong';
      }
      html += '<div class="' + cls + '" onclick="selectGroupAns(' + qi + ',' + oi + ')">';
      html += '<span class="opt-letter">' + String.fromCharCode(65+oi) + '</span>';
      html += '<span>' + opt + '</span></div>';
    });
    html += '</div>';

    if (!isFirst) html += '</div>';
  });

  html += '</div>';
  document.getElementById('q-area').innerHTML = html;
  updatePills();
}

function selectGroupAns(qi, oi) {
  if (answers[qi] >= 0) return;
  answers[qi] = oi;
  // Advance current to next unanswered in group, or last of group
  const gid = QUESTIONS[qi].gid;
  const indices = GROUP_MAP[gid];
  const nextUnanswered = indices.find(i => i > qi && answers[i] < 0);
  if (nextUnanswered !== undefined) current = nextUnanswered;
  else current = qi;
  renderQ();
}

function selectAns(oi) {
  if (answers[current] >= 0) return;
  answers[current] = oi;
  renderQ();
}

function speakGroup(gid) {
  const firstIdx = GROUP_MAP[gid][0];
  const q = QUESTIONS[firstIdx];
  if (q && q.tts) speak(q.tts);
}

function navQ(dir) {
  const q = QUESTIONS[current];
  // If in a group, jump to first/last of group then outside
  if (q.gid && dir === 1) {
    const indices = GROUP_MAP[q.gid];
    const lastInGroup = indices[indices.length - 1];
    current = Math.min(QUESTIONS.length - 1, lastInGroup + 1);
  } else if (q.gid && dir === -1) {
    const indices = GROUP_MAP[q.gid];
    current = Math.max(0, indices[0] - 1);
  } else {
    current = Math.max(0, Math.min(QUESTIONS.length - 1, current + dir));
    // If landed in middle of a group, go to first of group
    const nq = QUESTIONS[current];
    if (nq.gid) current = GROUP_MAP[nq.gid][0];
  }
  renderQ();
}

function submitTest() {
  clearInterval(timerID);
  document.getElementById('screen-test').style.display = 'none';
  document.getElementById('screen-result').style.display = 'block';
  showResult();
}

function showResult() {
  let total = 0;
  const partStats = {};

  QUESTIONS.forEach((q, i) => {
    const isCorrect = answers[i] === q.answer;
    if (isCorrect) total++;
    if (!partStats[q.part]) partStats[q.part] = {name: q.partName.split(' ').slice(0,2).join(' '), c:0, t:0};
    partStats[q.part].t++;
    if (isCorrect) partStats[q.part].c++;
  });

  const pct = Math.round(total / QUESTIONS.length * 100);
  // Rough TOEIC score estimate (Reading+Listening both 495 max → total 990)
  const est = Math.min(990, Math.round(total / QUESTIONS.length * 850 + 100));

  document.getElementById('score-big').textContent = total + ' / ' + QUESTIONS.length;
  document.getElementById('score-sub').innerHTML = '正確率 ' + pct + '% &nbsp;｜&nbsp; 估算多益分數 <strong>' + est + '</strong> 分';

  let psHtml = '';
  Object.entries(partStats).forEach(([part, s]) => {
    psHtml += '<div class="ps"><div class="ps-name">' + s.name + '</div><div class="ps-val">' + s.c + '/' + s.t + '</div></div>';
  });
  document.getElementById('part-scores').innerHTML = psHtml;

  let reviewHtml = '';
  QUESTIONS.forEach((q, i) => {
    const isCorrect = answers[i] === q.answer;
    const userAns = answers[i] >= 0 ? q.options[answers[i]] : '（未作答）';
    const correctAns = q.options[q.answer];
    reviewHtml += '<div class="r-item ' + (isCorrect ? 'ok' : 'bad') + '">';
    reviewHtml += '<div class="r-q"><strong>Q' + (i+1) + '.</strong> ' + q.text + '</div>';
    if (!isCorrect) {
      reviewHtml += '<div class="r-ans"><span class="wrong-lbl">✗ 你的答案：</span>' + userAns + '</div>';
      reviewHtml += '<div class="r-ans"><span class="correct-lbl">✓ 正確答案：</span>' + correctAns + '</div>';
    } else {
      reviewHtml += '<div class="r-ans"><span class="correct-lbl">✓ 答對：</span>' + correctAns + '</div>';
    }
    reviewHtml += '</div>';
  });
  document.getElementById('review-list').innerHTML = reviewHtml;
}

function speakCurrent() {
  const q = QUESTIONS[current];
  if (!q) return;
  if (q.tts) { speak(q.tts); return; }
  // Part 5-7: read passage (if any) + question text + options
  const passageText = (q.passageFull || q.passage || '').replace(/<[^>]+>/g, ' ').replace(/\s+/g,' ').trim();
  const qText = q.text.replace(/_{2,}/g, 'blank').replace(/<[^>]+>/g,' ').trim();
  const optText = q.options.map((o, i) => String.fromCharCode(65+i) + '. ' + o.replace(/\([A-D]\)\s*/,'').replace(/<[^>]+>/g,'')).join('. ');
  speak((passageText ? passageText + '. ' : '') + qText + '. ' + optText);
}

function speak(text) {
  if (!window.speechSynthesis) { alert('您的瀏覽器不支援語音合成'); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.9;
  // Wait for voices to load (Chrome requires this)
  const go = () => {
    const voices = window.speechSynthesis.getVoices();
    const en = voices.find(v => v.lang.startsWith('en') && v.name.includes('Google')) ||
               voices.find(v => v.lang.startsWith('en-US')) ||
               voices.find(v => v.lang.startsWith('en'));
    if (en) u.voice = en;
    window.speechSynthesis.speak(u);
  };
  if (window.speechSynthesis.getVoices().length) { go(); }
  else { window.speechSynthesis.onvoiceschanged = go; window.speechSynthesis.speak(u); }
}
</script>
